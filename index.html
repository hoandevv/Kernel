<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convolution 2D Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Convolution 2D Calculator</h1>
            <p class="subtitle">Tính phép tích chập trong xử lý ảnh - Cross-correlation</p>
        </header>

        <div class="input-section">
            <div class="matrix-inputs">
                <div class="input-group">
                    <label>Ma trận ảnh (I)</label>
                    <div class="matrix-controls">
                        <div class="size-control">
                            <span>Kích thước:</span>
                            <select id="imageRows" class="size-select">
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4" selected>4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                            </select>
                            <span>x</span>
                            <select id="imageCols" class="size-select">
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4" selected>4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                            </select>
                        </div>
                        <button id="resetImage" class="btn-reset">Reset</button>
                    </div>
                    <div id="matrixIContainer" class="matrix-grid-input"></div>
                </div>

                <div class="input-group">
                    <label>Kernel (H)</label>
                    <div class="matrix-controls">
                        <div class="size-control">
                            <span>Kích thước:</span>
                            <select id="kernelSize" class="size-select">
                                <option value="2">2x2</option>
                                <option value="3" selected>3x3</option>
                                <option value="5">5x5</option>
                                <option value="7">7x7</option>
                                <option value="9">9x9</option>
                            </select>
                        </div>
                        <button id="resetKernel" class="btn-reset">Reset</button>
                    </div>
                    <div id="kernelHContainer" class="matrix-grid-input"></div>
                </div>
            </div>

            <button id="calculateBtn" class="btn-calculate">
                <span class="btn-icon">▶</span>
                Calculate Convolution
            </button>
        </div>

        <div id="resultSection" class="result-section" style="display: none;">
            <div class="output-matrix-section">
                <div class="section-header">
                    <h2>Ma trận kết quả (Output)</h2>
                    <div class="matrix-dimensions" id="outputDimensions"></div>
                </div>
                <div id="outputMatrix" class="matrix-grid-output"></div>
            </div>

            <div class="steps-section">
                <div class="section-header">
                    <h2>Chi tiết từng bước tính</h2>
                    <div class="steps-count" id="stepsCount"></div>
                </div>
                <div id="stepsDetail" class="steps-detail"></div>
            </div>
        </div>

        <footer>
            <p>Convolution 2D Calculator by hoandevv &copy; 2026</p>
            <p class="footer-desc">Công cụ trực quan hóa phép tích chập 2D trong xử lý ảnh</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
