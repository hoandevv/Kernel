<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convolution 2D Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Convolution 2D Calculator</h1>
            <p class="subtitle">Tính phép tích chập trong xử lý ảnh - Cross-correlation</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <label for="matrixI">Ma trận ảnh (I)</label>
                <textarea id="matrixI" placeholder="0 7 10 1
2 9 1 0
9 10 10 1
8 8 7 6"></textarea>
            </div>

            <div class="input-group">
                <label for="kernelH">Kernel (H)</label>
                <textarea id="kernelH" placeholder="1 2 1
3 1 0
1 0 1"></textarea>
            </div>

            <button id="calculateBtn" class="btn-calculate">Calculate</button>
        </div>

        <div id="resultSection" class="result-section" style="display: none;">
            <div class="output-matrix-section">
                <h2>Ma trận kết quả (Output)</h2>
                <div id="outputMatrix" class="matrix-grid"></div>
            </div>

            <div class="steps-section">
                <h2>Chi tiết từng bước tính</h2>
                <div id="stepsDetail" class="steps-detail"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
