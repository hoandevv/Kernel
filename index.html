<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convolution 2D Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --surface3: #232840;
    --border: #2a3050;
    --border2: #3a4470;
    --text: #e8eaf6;
    --text2: #8892b0;
    --text3: #4a5680;
    --accent: #00d4aa;
    --accent-dim: rgba(0,212,170,0.12);
    --accent-dim2: rgba(0,212,170,0.06);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.12);
    --danger: #ff6b6b;
    --grid-bg: rgba(0,212,170,0.03);
  }

  [data-theme="light"] {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #f8fafc;
    --surface3: #e2e8f0;
    --border: #cbd5e1;
    --border2: #94a3b8;
    --text: #1e293b;
    --text2: #475569;
    --text3: #94a3b8;
    --accent: #0891b2;
    --accent-dim: rgba(8,145,178,0.1);
    --accent-dim2: rgba(8,145,178,0.05);
    --amber: #d97706;
    --amber-dim: rgba(217,119,6,0.1);
    --danger: #dc2626;
    --grid-bg: rgba(8,145,178,0.03);
  }

  :root {
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 8px;
    --radius-lg: 14px;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    line-height: 1.6;
    transition: background 0.3s, color 0.3s;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-bg) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-bg) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
  }

  .theme-toggle {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 100;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 1.2rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .theme-toggle:hover {
    border-color: var(--accent);
  }

  .theme-toggle span {
    font-size: 0.7rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
    padding-top: 1rem;
  }

  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    border: 1px solid rgba(0,212,170,0.3);
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 1.2rem;
    text-transform: uppercase;
  }

  header h1 {
    font-family: var(--mono);
    font-size: clamp(1.5rem, 4vw, 2.4rem);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 0.6rem;
  }

  header h1 span { color: var(--accent); }

  header p {
    color: var(--text2);
    font-size: 0.9rem;
    font-weight: 300;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.75rem;
    margin-bottom: 1.25rem;
    transition: background 0.3s, border-color 0.3s;
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .input-columns {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 1.5rem;
    align-items: start;
  }

  .operator-divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 3.5rem;
    gap: 0.5rem;
  }

  .op-star {
    font-family: var(--mono);
    font-size: 1.8rem;
    color: var(--accent);
    opacity: 0.5;
    line-height: 1;
  }

  .op-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text3);
    letter-spacing: 0.1em;
  }

  .matrix-group label {
    display: block;
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text2);
    margin-bottom: 1rem;
    letter-spacing: 0.06em;
  }

  .matrix-group label span {
    display: inline-block;
    font-size: 0.9rem;
    color: var(--accent);
    margin-left: 4px;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.1rem;
    flex-wrap: wrap;
  }

  .controls-row span {
    font-size: 0.78rem;
    color: var(--text3);
    font-family: var(--mono);
  }

  select.size-sel {
    font-family: var(--mono);
    font-size: 0.78rem;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 5px 10px;
    cursor: pointer;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    min-width: 58px;
    text-align: center;
    transition: border-color 0.2s, background 0.2s;
  }

  select.size-sel:hover, select.size-sel:focus {
    border-color: var(--accent);
  }

  .btn-ghost {
    font-family: var(--mono);
    font-size: 0.7rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--text3);
    padding: 5px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .matrix-grid {
    display: grid;
    gap: 5px;
  }

  .matrix-grid input[type=number] {
    font-family: var(--mono);
    font-size: 0.9rem;
    text-align: center;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 4px;
    width: 100%;
    min-width: 0;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -moz-appearance: textfield;
  }

  .matrix-grid input[type=number]::-webkit-inner-spin-button,
  .matrix-grid input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  .matrix-grid input[type=number]:hover { border-color: var(--border2); }
  .matrix-grid input[type=number]:focus {
    border-color: var(--accent);
    background: var(--accent-dim2);
  }

  .btn-calc {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    background: var(--accent);
    color: #04342c;
    border: none;
    border-radius: var(--radius-lg);
    padding: 1rem 2.5rem;
    cursor: pointer;
    width: 100%;
    max-width: 360px;
    margin: 1.75rem auto 0;
    transition: opacity 0.2s, transform 0.15s, background 0.3s;
  }

  .btn-calc:hover { opacity: 0.9; }
  .btn-calc:active { transform: scale(0.98); }
  .btn-calc .icon { font-size: 1.1rem; line-height: 1; }

  #resultSection { animation: fadeSlide 0.4s ease; }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 1.25rem;
    align-items: start;
    min-width: 0;
  }

  .result-output,
  .result-steps {
    min-width: 0;
  }

  .output-cells {
    display: grid;
    gap: 5px;
    width: 100%;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .out-cell {
    font-family: var(--mono);
    font-size: 0.9rem;
    text-align: center;
    padding: 9px 6px;
    background: var(--accent-dim2);
    border: 1px solid rgba(0,212,170,0.2);
    border-radius: 6px;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s;
    min-width: 0;
    min-height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .out-cell:hover, .out-cell.active {
    background: var(--accent-dim);
    border-color: var(--accent);
  }

  .out-cell.active { box-shadow: 0 0 0 2px rgba(0,212,170,0.3); }

  .steps-list { display: flex; flex-direction: column; gap: 10px; }

  .step-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.2rem;
    transition: border-color 0.2s, background 0.2s;
    cursor: default;
  }

  .step-card.active {
    border-color: var(--accent);
    background: var(--accent-dim2);
  }

  .step-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.6rem;
  }

  .step-pos {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  .step-val {
    font-family: var(--mono);
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }

  .step-val span { color: var(--accent); }

  .step-eq {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text2);
    word-break: break-all;
    line-height: 1.7;
  }

  .highlight-term {
    background: var(--amber-dim);
    color: var(--amber);
    border-radius: 3px;
    padding: 0 3px;
  }

  .step-detail {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-top: 0.6rem;
  }

  .detail-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .detail-box {
    font-family: var(--mono);
    font-size: 0.7rem;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
    padding: 8px 10px;
    margin: 0;
    color: var(--text2);
    white-space: pre;
    line-height: 1.6;
  }

  .detail-box.calc {
    border-left-color: var(--amber);
    color: var(--text);
  }

  .step-result {
    font-family: var(--mono);
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-dim2);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 8px 12px;
    margin-top: 0.3rem;
  }

  @media (max-width: 680px) {
    .input-columns { 
      grid-template-columns: 1fr; 
      gap: 1rem;
    }
    .operator-divider { 
      flex-direction: row; 
      padding-top: 0;
      padding-left: 0;
      padding-right: 0;
    }
    .result-grid { 
      grid-template-columns: 1fr; 
      gap: 1rem;
    }
    .panel { 
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .output-cells { 
      gap: 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .out-cell {
      font-size: 0.78rem;
      padding: 7px 4px;
      min-height: 34px;
      flex-shrink: 0;
    }
    .steps-scroll {
      max-height: none;
      overflow-y: visible;
      padding-right: 0;
    }
    .detail-box {
      overflow-x: auto;
      white-space: pre;
      -webkit-overflow-scrolling: touch;
    }
    .matrix-grid {
      gap: 3px;
    }
    .matrix-grid input[type=number] {
      padding: 6px 3px;
      font-size: 0.85rem;
    }
  }

  @media (max-width: 480px) {
    .input-columns { 
      grid-template-columns: 1fr;
      gap: 0.8rem;
    }
    .operator-divider { 
      gap: 0.3rem;
      margin: 0.8rem 0;
    }
    .op-star {
      font-size: 1.4rem;
    }
    body { 
      padding: 0.8rem 0.5rem 2.5rem;
    }
    .panel { 
      padding: 0.8rem;
      margin-bottom: 0.8rem;
    }
    .panel-title {
      font-size: 0.65rem;
      margin-bottom: 1rem;
      gap: 8px;
    }
    .out-cell {
      font-size: 0.7rem;
      padding: 6px 2px;
      min-height: 30px;
    }
    .controls-row {
      gap: 6px;
      margin-bottom: 0.8rem;
    }
    .controls-row span {
      font-size: 0.7rem;
    }
    select.size-sel {
      font-size: 0.7rem;
      padding: 4px 8px;
      min-width: 50px;
    }
    .btn-ghost {
      font-size: 0.65rem;
      padding: 4px 8px;
    }
    .btn-calc {
      padding: 0.8rem 1.5rem;
      font-size: 0.8rem;
      max-width: 100%;
      margin: 1rem auto 0;
    }
    .matrix-grid {
      gap: 2px;
    }
    .matrix-grid input[type=number] {
      padding: 5px 2px;
      font-size: 0.8rem;
    }
    .result-grid {
      grid-template-columns: 1fr;
      gap: 0.8rem;
    }
    .output-cells {
      gap: 3px;
    }
    .step-card {
      padding: 0.8rem 1rem;
      border-radius: 6px;
    }
    .step-header {
      margin-bottom: 0.4rem;
    }
    .detail-box {
      font-size: 0.65rem;
      padding: 6px 8px;
    }
    .step-result {
      font-size: 0.8rem;
      padding: 6px 10px;
    }
    header h1 {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
    }
    header p {
      font-size: 0.8rem;
    }
    .badge {
      font-size: 10px;
      padding: 3px 10px;
    }
  }

  @media (max-width: 360px) {
    body {
      padding: 0.6rem 0.4rem 2rem;
    }
    .panel {
      padding: 0.6rem;
      margin-bottom: 0.6rem;
    }
    .out-cell {
      font-size: 0.65rem;
      padding: 5px 1px;
      min-height: 28px;
    }
    select.size-sel {
      min-width: 45px;
      font-size: 0.65rem;
    }
    .btn-calc {
      padding: 0.7rem 1rem;
      font-size: 0.75rem;
    }
  }

  footer {
    text-align: center;
    margin-top: 3rem;
    color: var(--text3);
    font-size: 0.78rem;
    font-family: var(--mono);
    letter-spacing: 0.06em;
  }

  .dims-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text3);
    margin-bottom: 0.8rem;
  }

  .dims-label strong { color: var(--accent); font-weight: 700; }

  .steps-meta {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text3);
    margin-bottom: 0.8rem;
  }

  .steps-meta strong { color: var(--text2); }

  .steps-scroll {
    max-height: 520px;
    overflow-y: auto;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .steps-scroll::-webkit-scrollbar { width: 4px; }
  .steps-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  [data-theme="light"] .btn-calc { color: #ecfeff; }
</style>
</head>
<body>
<div class="wrapper">

  <button class="theme-toggle" id="themeToggle">
    🌙 <span>Dark</span>
  </button>

  <header>
    <div class="badge">Signal Processing Tool</div>
    <h1>Convolution <span>2D</span> Calculator</h1>
    <p>Cross-correlation · Tính tích chập 2D trong xử lý ảnh</p>
  </header>

  <div class="panel">
    <div class="panel-title">Input</div>
    <div class="input-columns">

      <div class="matrix-group">
        <label>Ma trận ảnh <span>I</span></label>
        <div class="controls-row">
          <span>Size:</span>
          <select id="imageRows" class="size-sel" title="Rows"></select>
          <span>×</span>
          <select id="imageCols" class="size-sel" title="Cols"></select>
          <button class="btn-ghost" id="resetImage">Reset</button>
        </div>
        <div id="matrixIContainer" class="matrix-grid"></div>
      </div>

      <div class="operator-divider">
        <div class="op-star">★</div>
        <div class="op-label">conv</div>
      </div>

      <div class="matrix-group">
        <label>Kernel <span>H</span></label>
        <div class="controls-row">
          <span>Size:</span>
          <select id="kernelSize" class="size-sel" title="Kernel size">
            <option value="2">2×2</option>
            <option value="3" selected>3×3</option>
            <option value="5">5×5</option>
            <option value="7">7×7</option>
            <option value="9">9×9</option>
          </select>
          <button class="btn-ghost" id="resetKernel">Reset</button>
        </div>
        <div id="kernelHContainer" class="matrix-grid"></div>
      </div>

    </div>

    <div style="display:flex;justify-content:center;">
      <button class="btn-calc" id="calculateBtn">
        <span class="icon">▶</span>
        Calculate Convolution
      </button>
    </div>
  </div>

  <div id="resultSection" style="display:none;">
    <div class="panel">
      <div class="panel-title">Output</div>
      <div class="result-grid">

        <div class="result-output">
          <div class="dims-label" id="outputDimensions"></div>
          <div id="outputMatrix" class="output-cells"></div>
        </div>

        <div class="result-steps">
          <div class="steps-meta" id="stepsCount"></div>
          <div class="steps-scroll">
            <div id="stepsDetail" class="steps-list"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <footer>
    <p>Convolution 2D Calculator · hoandevv &copy; 2026</p>
  </footer>
</div>

<script>
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}

const sizes = [2,3,4,5,6,7,8,9,10];
['imageRows','imageCols'].forEach(id=>{
  const sel=document.getElementById(id);
  sizes.forEach(s=>{
    const o=document.createElement('option');
    o.value=s; o.textContent=s;
    if(s===4) o.selected=true;
    sel.appendChild(o);
  });
});

function buildMatrix(containerId, rows, cols, defaults){
  const c=document.getElementById(containerId);
  c.style.gridTemplateColumns=`repeat(${cols}, 1fr)`;
  c.innerHTML='';
  for(let r=0;r<rows;r++) for(let col=0;col<cols;col++){
    const inp=document.createElement('input');
    inp.type='number'; inp.value= defaults ? (defaults[r]?.[col]??0) : 0;
    inp.setAttribute('data-r',r); inp.setAttribute('data-c',col);
    c.appendChild(inp);
  }
}

function getMatrix(containerId, rows, cols){
  const c=document.getElementById(containerId);
  const m=Array.from({length:rows},()=>Array(cols).fill(0));
  c.querySelectorAll('input').forEach(inp=>{
    m[+inp.dataset.r][+inp.dataset.c]=parseFloat(inp.value)||0;
  });
  return m;
}

const defaultImage=[
  [1,2,3,0],[0,1,2,1],[1,0,1,2],[2,1,0,1]
];
const defaultKernel=[[1,0,-1],[1,0,-1],[1,0,-1]];

function initImage(){
  const r=+document.getElementById('imageRows').value;
  const c=+document.getElementById('imageCols').value;
  buildMatrix('matrixIContainer',r,c,defaultImage);
}
function initKernel(){
  const k=+document.getElementById('kernelSize').value;
  buildMatrix('kernelHContainer',k,k,defaultKernel);
}
function resetImageDefaults(){
  const r=+document.getElementById('imageRows').value;
  const c=+document.getElementById('imageCols').value;
  buildMatrix('matrixIContainer',r,c,defaultImage);
}
function resetKernelDefaults(){
  const k=+document.getElementById('kernelSize').value;
  buildMatrix('kernelHContainer',k,k,defaultKernel);
}

document.getElementById('imageRows').addEventListener('change',initImage);
document.getElementById('imageCols').addEventListener('change',initImage);
document.getElementById('kernelSize').addEventListener('change',initKernel);
document.getElementById('resetImage').addEventListener('click',resetImageDefaults);
document.getElementById('resetKernel').addEventListener('click',resetKernelDefaults);

initImage(); initKernel();

function fmt(n){ return Number.isInteger(n)?String(n):n.toFixed(3).replace(/\.?0+$/,''); }

document.getElementById('calculateBtn').addEventListener('click',()=>{
  const iR=+document.getElementById('imageRows').value;
  const iC=+document.getElementById('imageCols').value;
  const kS=+document.getElementById('kernelSize').value;

  const I=getMatrix('matrixIContainer',iR,iC);
  const H=getMatrix('kernelHContainer',kS,kS);

  const pad=Math.floor(kS/2);
  const oR=iR;
  const oC=iC;

  const steps=[]; const out=[];
  for(let r=0;r<oR;r++){
    out.push([]);
    for(let c=0;c<oC;c++){
      let sum=0; const terms=[];
      for(let ki=0;ki<kS;ki++) for(let kj=0;kj<kS;kj++){
        const ri=r+ki-pad;
        const ci=c+kj-pad;
        let iv=0;
        if(ri>=0 && ri<iR && ci>=0 && ci<iC){
          iv=I[ri][ci];
        }
        const kv=H[ki][kj];
        sum+=iv*kv;
        terms.push({iv,kv,ri,ci,ki,kj});
      }
      out[r].push(sum);
      steps.push({r,c,sum,terms});
    }
  }

  const outEl=document.getElementById('outputMatrix');
  outEl.style.gridTemplateColumns=`repeat(${oC}, minmax(30px, 1fr))`;
  outEl.innerHTML='';
  out.forEach((row,ri)=>row.forEach((val,ci)=>{
    const cell=document.createElement('div');
    cell.className='out-cell'; cell.textContent=fmt(val);
    cell.dataset.step=ri*oC+ci;
    cell.addEventListener('click',()=>highlightStep(ri*oC+ci));
    outEl.appendChild(cell);
  }));

  document.getElementById('outputDimensions').innerHTML=
    `Output: <strong>${oR}×${oC}</strong>`;
  document.getElementById('stepsCount').innerHTML=
    `<strong>${steps.length}</strong> phép tính — click ô để xem chi tiết`;

  const stepsEl=document.getElementById('stepsDetail');
  stepsEl.innerHTML='';
  steps.forEach((s,idx)=>{
    const card=document.createElement('div');
    card.className='step-card'; card.id=`step-${idx}`;

    const eqParts=s.terms.map(t=>{
      const neg=t.kv<0?`<span class="highlight-term">${fmt(t.iv)}</span>×(${fmt(t.kv)})`
                      :`<span class="highlight-term">${fmt(t.iv)}</span>×${fmt(t.kv)}`;
      return neg;
    });

    const kS=H.length;
    let regionText='';
    for(let ri=0; ri<kS; ri++){
      for(let ci=0; ci<kS; ci++){
        regionText+=`${fmt(s.terms[ri*kS+ci].iv)}[${ri},${ci}]`;
        if(ci<kS-1) regionText+='  ';
      }
      if(ri<kS-1) regionText+='\n';
    }
    
    let kernelText='';
    for(let ri=0; ri<kS; ri++){
      for(let ci=0; ci<kS; ci++){
        kernelText+=`H[${ri},${ci}]=${fmt(H[ri][ci])}`;
        if(ci<kS-1) kernelText+='  ';
      }
      if(ri<kS-1) kernelText+='\n';
    }
    
    const calcParts=s.terms.map(t=>`(${fmt(t.iv)}×${fmt(t.kv)})`);
    
    card.innerHTML=`
      <div class="step-header">
        <span class="step-pos">OUT[${s.r}][${s.c}]</span>
      </div>
      <div class="step-detail">
        <div class="detail-label">Vùng ảnh (I):</div>
        <pre class="detail-box">${regionText}</pre>
        <div class="detail-label" style="color:var(--amber);">Kernel (H):</div>
        <pre class="detail-box" style="border-left-color:var(--amber);">${kernelText}</pre>
        <div class="detail-label">Phép tính:</div>
        <pre class="detail-box calc">${calcParts.join(' + ')}</pre>
        <div class="step-result">= ${fmt(s.sum)}</div>
      </div>`;
    stepsEl.appendChild(card);
  });

  document.getElementById('resultSection').style.display='block';
  document.getElementById('resultSection').scrollIntoView({behavior:'smooth',block:'start'});
  highlightStep(0);
});

function highlightStep(idx){
  document.querySelectorAll('.step-card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.out-cell').forEach(c=>c.classList.remove('active'));
  const card=document.getElementById(`step-${idx}`);
  if(card){
    card.classList.add('active');
    card.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  const cell=document.querySelector(`.out-cell[data-step="${idx}"]`);
  if(cell) cell.classList.add('active');
}

const themeToggle=document.getElementById('themeToggle');
const html=document.documentElement;

themeToggle.addEventListener('click',()=>{
  if(html.getAttribute('data-theme')==='light'){
    html.removeAttribute('data-theme');
    themeToggle.innerHTML='🌙 <span>Dark</span>';
    localStorage.setItem('theme','dark');
  }else{
    html.setAttribute('data-theme','light');
    themeToggle.innerHTML='☀️ <span>Light</span>';
    localStorage.setItem('theme','light');
  }
});

const saved=localStorage.getItem('theme');
if(saved==='light'){
  html.setAttribute('data-theme','light');
  themeToggle.innerHTML='☀️ <span>Light</span>';
}
</script>
</body>
</html>
